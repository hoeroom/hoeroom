<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon | Under Construction</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', -apple-system, sans-serif; }
        body { 
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%); 
            color: #ffffff; height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center;
        }
        .container { max-width: 500px; padding: 2rem; border-radius: 12px; background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); }
        .logo { font-size: 1.5rem; font-weight: 800; letter-spacing: -1px; margin-bottom: 2rem; color: #ff3e3e; text-transform: uppercase; }
        h1 { font-size: 2.5rem; margin-bottom: 1rem; font-weight: 700; letter-spacing: -0.5px; }
        p { font-size: 1rem; color: #888; margin-bottom: 2rem; line-height: 1.5; }
        .input-group { display: flex; gap: 8px; flex-direction: column; }
        input[type="email"] { 
            padding: 14px; border-radius: 8px; border: 1px solid #333; background: #111; color: #fff; width: 100%; font-size: 1rem; outline: none;
        }
        input[type="email"]:focus { border-color: #ff3e3e; }
        button { 
            padding: 14px; border-radius: 8px; border: none; background: #ff3e3e; color: #fff; 
            font-weight: 600; cursor: pointer; transition: 0.2s; font-size: 1rem;
        }
        button:hover { background: #e63535; transform: scale(1.02); }
        .footer { margin-top: 2rem; font-size: 0.8rem; color: #555; }
    </style>
</head>
<body>
    <div class="container">
        <img src="image.png" height="500px">
        <div class="logo">HoeRoom</div>
        <h1>Coming Soon</h1>
        <p>While You're Waiting</p>
        
        <form class="input-group" action="https://refer.discovercard.com/MaTarage6?add=12">
            <button type="submit">Get Free $100</button>
        </form>

        <div class="footer">
            &copy; 2024 HoeRoom. All rights reserved.
        </div>
    </div>
</body>
</html>
